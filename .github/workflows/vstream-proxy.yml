name: Déployer le proxy vStream

on:
  workflow_dispatch:  # déclenchement manuel
  push:
    paths:
      - 'sources.json'  # optionnel : se déclenche si tu changes sources.json

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Télécharger vStream et préparer le serveur
        run: |
          # Télécharger le dépôt vStream
          wget -q -O vstream.zip https://github.com/Kodi-vStream/venom-xbmc-addons/archive/refs/heads/master.zip
          unzip -q vstream.zip
          mkdir -p vstream-proxy/resources
          mv venom-xbmc-addons-master/plugin.video.vstream/resources/* vstream-proxy/resources/
          rm -rf venom-xbmc-addons-master vstream.zip

          # Créer le serveur Flask
          cat > vstream-proxy/app.py << 'EOF'
import json, sys, os, importlib.util
from flask import Flask, request, jsonify
from flask_cors import CORS

app = Flask(__name__)
CORS(app)

def import_scraper(site_name):
    file_path = f"resources/sites/{site_name}.py"
    if not os.path.exists(file_path):
        return None
    spec = importlib.util.spec_from_file_location(site_name, file_path)
    module = importlib.util.module_from_spec(spec)
    sys.modules[site_name] = module
    spec.loader.exec_module(module)
    return module

@app.route('/streams')
def get_streams():
    tmdb_id = request.args.get('id')
    media_type = request.args.get('type')
    season = request.args.get('s', 1, type=int)
    episode = request.args.get('e', 1, type=int)
    if not tmdb_id:
        return jsonify({"error": "Missing id"}), 400
    # Exemple avec wiflix (tu peux en essayer d'autres)
    module = import_scraper('wiflix')
    if module and hasattr(module, 'getStreams'):
        try:
            streams = module.getStreams(tmdb_id, media_type, season, episode)
            return jsonify(streams)
        except Exception as e:
            return jsonify([])
    return jsonify([])

@app.route('/')
def index():
    return "vStream proxy ready"
EOF

          # requirements.txt
          cat > vstream-proxy/requirements.txt << 'EOF'
flask
flask_cors
EOF

      - name: Upload l'artéfact (optionnel)
        uses: actions/upload-artifact@v4
        with:
          name: vstream-proxy
          path: vstream-proxy

