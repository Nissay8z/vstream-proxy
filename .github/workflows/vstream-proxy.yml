name: Déployer le proxy vStream

on:
  workflow_dispatch:
  push:
    paths:
      - 'sources.json'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Télécharger vStream et préparer le serveur
        run: |
          # Télécharger le dépôt vStream
          wget -q -O vstream.zip https://github.com/Kodi-vStream/venom-xbmc-addons/archive/refs/heads/master.zip
          unzip -q vstream.zip
          mkdir -p vstream-proxy/resources
          mv venom-xbmc-addons-master/plugin.video.vstream/resources/* vstream-proxy/resources/
          rm -rf venom-xbmc-addons-master vstream.zip
          # Copier app.py depuis la racine
          cp app.py vstream-proxy/
          # Créer requirements.txt
          echo "flask" > vstream-proxy/requirements.txt
          echo "flask_cors" >> vstream-proxy/requirements.txt

      - name: Upload l'artéfact
        uses: actions/upload-artifact@v4
        with:
          name: vstream-proxy
          path: vstream-proxy
